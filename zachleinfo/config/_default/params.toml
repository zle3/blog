colorScheme = "zli-ppr-custom"
defaultAppearance = "dark"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true
disableImageOptimization = false
disableTextInHeader = false
mainSections = ["blog", "portfolio"]

[header]
layout = "basic"

[footer]
showMenu = true
showCopyright = false
showThemeAttribution = false
showAppearanceSwitcher = true
showScrollToTop = true

[homepage]
layout = "profile"
showRecent = true
showRecentItems = 6
showMoreLink = true
showMoreLinkDest = "blog"
cardView = true
cardViewScreenWidth = false
layoutBackgroundBlur = false

[article]
showDate = true
showViews = true
showLikes = true
showDateOnlyInArticle = false
showDateUpdated = true
showAuthor = true
showHero = true
layoutBackgroundBlur = true
layoutBackgroundHeaderSpace = true
showBreadcrumbs = false
showDraftLabel = true
showEdit = false
editAppendPath = true
seriesOpened = false
showHeadingAnchors = true
showPagination = true
invertPagination = false
showReadingTime = true
showTableOfContents = true
showTaxonomies = true
showAuthorsBadges = false
showWordCount = true
showZenMode = false
showRelatedContent = true
relatedContentLimit = 3

[list]
showHero = false
layoutBackgroundBlur = true
layoutBackgroundHeaderSpace = true
showBreadcrumbs = false
showSummary = false
showViews = false
showLikes = false
showTableOfContents = true
showCards = false
groupByYear = true
cardView = true
cardViewScreenWidth = false
constrainItemsWidth = false

[sitemap]
excludedKinds = [ "taxonomy", "term" ]

[taxonomy]
showTermCount = true
showHero = false
showBreadcrumbs = false
showViews = false
showLikes = false
showTableOfContents = true
cardView = false

[term]
showHero = false
showBreadcrumbs = false
showViews = false
showLikes = false
showTableOfContents = true
groupByYear = false
cardView = false
cardViewScreenWidth = false

[firebase]
# Populated at build time via Cloudflare Pages environment variables:
# HUGO_PARAMS_FIREBASE_APIKEY, HUGO_PARAMS_FIREBASE_AUTHDOMAIN,
# HUGO_PARAMS_FIREBASE_PROJECTID, HUGO_PARAMS_FIREBASE_STORAGEBUCKET,
# HUGO_PARAMS_FIREBASE_MESSAGINGSENDERID, HUGO_PARAMS_FIREBASE_APPID,
# HUGO_PARAMS_FIREBASE_MEASUREMENTID
# Left blank here on purpose -- Hugo merges the env vars into these keys
# at build time, so no secret ever needs to be committed to the repo.

